<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWP - Parallel Method Comparison</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .compare-controls {
            display: flex; gap: 12px; align-items: center;
            padding: 12px; background: #1e1e2e; border-radius: 8px; margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .compare-controls label { color: #cdd6f4; font-size: 14px; }
        .compare-controls select, .compare-controls input {
            padding: 4px 8px; border-radius: 4px; border: 1px solid #45475a;
            background: #313244; color: #cdd6f4;
        }
        .compare-grid {
            display: grid; gap: 8px; overflow-x: auto;
        }
        .compare-row {
            display: flex; gap: 8px; align-items: flex-start;
        }
        .compare-row .row-label {
            min-width: 120px; padding-top: 8px; font-weight: bold;
            color: #cdd6f4; font-size: 13px;
        }
        .compare-cell {
            text-align: center; min-width: 180px;
        }
        .compare-cell canvas {
            border: 1px solid #45475a; border-radius: 4px;
            image-rendering: pixelated;
        }
        .compare-cell h4 {
            margin: 4px 0; color: #cdd6f4; font-size: 12px;
        }
        .method-metrics {
            font-size: 11px; color: #a6adc8; text-align: left;
            padding: 4px 8px; background: #1e1e2e; border-radius: 4px;
            min-height: 60px;
        }
        .step-indicator {
            font-size: 13px; color: #f9e2af; margin-left: auto;
        }
        #referenceRow { margin-bottom: 8px; }
        a.back-link { color: #89b4fa; text-decoration: none; margin-left: 16px; }
    </style>
</head>
<body>
    <header>
        <h1>OWP - Parallel Method Comparison</h1>
        <p class="subtitle">Compare sampling methods side-by-side</p>
        <a href="/" class="back-link">Back to main</a>
    </header>

    <main>
        <!-- Controls -->
        <div class="compare-controls">
            <label>Field Type:
                <select id="fieldType">
                    <option value="single_channel">Single Channel</option>
                    <option value="multi_channel" selected>Multi-Channel</option>
                    <option value="branching">Branching</option>
                    <option value="random">Random Correlated</option>
                    <option value="porphyry">Porphyry</option>
                    <option value="veins">Veins</option>
                    <option value="faulted">Faulted</option>
                    <option value="folded">Folded</option>
                    <option value="disseminated">Disseminated</option>
                </select>
            </label>
            <label>Size:
                <select id="fieldSize">
                    <option value="16">16</option>
                    <option value="24">24</option>
                    <option value="32" selected>32</option>
                </select>
            </label>
            <label>Samples:
                <input type="number" id="numSamples" value="15" min="3" max="100">
            </label>
            <label>Methods:
                <select id="methodSelect" multiple size="4" style="min-width:200px">
                    <option value="random_uniform" selected>Random Uniform</option>
                    <option value="stratified" selected>Stratified Grid</option>
                    <option value="adaptive_entropy" selected>Adaptive Entropy</option>
                    <option value="penalized_adaptive">Penalized Adaptive</option>
                    <option value="multiscale_stratified">Multiscale Stratified</option>
                    <option value="oracle_entropy">Oracle Entropy</option>
                </select>
            </label>
            <button id="startBtn" class="btn btn-primary">Start Comparison</button>
            <span id="stepIndicator" class="step-indicator"></span>
        </div>

        <!-- Row 1: Reference -->
        <div class="compare-row" id="referenceRow">
            <div class="compare-cell">
                <h4>Training Image</h4>
                <canvas id="canvasRefTI" width="180" height="180"></canvas>
            </div>
            <div class="compare-cell">
                <h4>True Field</h4>
                <canvas id="canvasRefTrue" width="180" height="180"></canvas>
            </div>
        </div>

        <!-- Dynamic rows -->
        <div id="sampledRow" class="compare-row"></div>
        <div id="entropyRow" class="compare-row"></div>
        <div id="reconRow" class="compare-row"></div>
        <div id="metricsRow" class="compare-row"></div>
    </main>

    <script src="/js/renderer.js"></script>
    <script>
    (function() {
        'use strict';

        const startBtn = document.getElementById('startBtn');
        const stepIndicator = document.getElementById('stepIndicator');
        let animFrameId = null;

        startBtn.addEventListener('click', runComparison);

        async function apiCall(endpoint, body) {
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            return await resp.json();
        }

        async function runComparison() {
            startBtn.disabled = true;
            stepIndicator.textContent = 'Generating field...';

            const size = parseInt(document.getElementById('fieldSize').value);
            const numSamples = parseInt(document.getElementById('numSamples').value);
            const fieldType = document.getElementById('fieldType').value;
            const methodSelect = document.getElementById('methodSelect');
            const methods = Array.from(methodSelect.selectedOptions).map(o => o.value);

            if (methods.length === 0) {
                stepIndicator.textContent = 'Select at least one method.';
                startBtn.disabled = false;
                return;
            }

            const seed = Math.floor(Math.random() * 100000);
            const tiSize = Math.min(size * 2, 128);

            // Generate field
            const genResult = await apiCall('/api/generate', {
                field_type: fieldType,
                field_height: size, field_width: size,
                ti_height: tiSize, ti_width: tiSize,
                seed: seed,
            });

            if (genResult.status !== 'ok') {
                stepIndicator.textContent = 'Generation failed.';
                startBtn.disabled = false;
                return;
            }

            // Render reference images
            Renderer.renderField('canvasRefTI', genResult.training_image);

            // Setup columns
            const sampledRow = document.getElementById('sampledRow');
            const entropyRow = document.getElementById('entropyRow');
            const reconRow = document.getElementById('reconRow');
            const metricsRow = document.getElementById('metricsRow');

            sampledRow.innerHTML = '<div class="row-label">Sampled</div>';
            entropyRow.innerHTML = '<div class="row-label">Entropy</div>';
            reconRow.innerHTML = '<div class="row-label">Reconstruction</div>';
            metricsRow.innerHTML = '<div class="row-label">Metrics</div>';

            methods.forEach(m => {
                const label = m.replace(/_/g, ' ');
                ['sampled', 'entropy', 'recon', 'metrics'].forEach(rowType => {
                    const row = document.getElementById(rowType + 'Row');
                    const cell = document.createElement('div');
                    cell.className = 'compare-cell';
                    cell.id = `${rowType}-${m}`;
                    if (rowType === 'metrics') {
                        cell.innerHTML = `<h4>${label}</h4><div class="method-metrics" id="metrics-text-${m}">...</div>`;
                    } else {
                        cell.innerHTML = `<h4>${label}</h4><canvas id="canvas-${rowType}-${m}" width="180" height="180"></canvas>`;
                    }
                    row.appendChild(cell);
                });
            });

            // Fetch animated results for all methods in parallel
            stepIndicator.textContent = 'Processing methods...';

            const promises = methods.map(m =>
                apiCall('/api/process-animated', {
                    method: m,
                    num_samples: numSamples,
                    pattern_radius: 3,
                    num_training_images: 5,
                    recon_method: 'kriging',
                    seed: seed + 500,
                })
            );

            const allResults = await Promise.all(promises);

            // Check for true field (get from infer endpoint)
            const inferResult = await apiCall('/api/infer', { method: 'kriging' });
            if (inferResult.true_field) {
                Renderer.renderField('canvasRefTrue', inferResult.true_field);
            }

            // Animate step by step
            const maxSteps = Math.max(...allResults.map(r => r.results ? r.results.length : 0));

            let step = 0;
            function animateStep() {
                if (step >= maxSteps) {
                    stepIndicator.textContent = `Complete (${maxSteps} steps)`;
                    startBtn.disabled = false;
                    return;
                }

                stepIndicator.textContent = `Step ${step + 1} / ${maxSteps}`;

                methods.forEach((m, i) => {
                    const res = allResults[i];
                    if (!res.results || step >= res.results.length) return;
                    const frame = res.results[step];

                    // Sampled positions (mask)
                    Renderer.renderField(`canvas-sampled-${m}`, frame.mask);

                    // Entropy
                    Renderer.renderField(`canvas-entropy-${m}`, frame.entropy_map, { colormap: 'entropy' });

                    // Reconstruction
                    Renderer.renderField(`canvas-recon-${m}`, frame.reconstruction, { colormap: 'probability' });

                    // Metrics
                    const mt = frame.metrics;
                    const panel = document.getElementById(`metrics-text-${m}`);
                    if (panel && mt) {
                        const acc = mt.accuracy !== undefined ? (mt.accuracy * 100).toFixed(1) : '?';
                        const snr = mt.snr_db !== undefined ? mt.snr_db.toFixed(1) : '?';
                        const f1 = mt.cm_f1 !== undefined ? (mt.cm_f1 * 100).toFixed(1) : '?';
                        panel.innerHTML = `Acc: ${acc}% | SNR: ${snr}dB | F1: ${f1}%`;
                    }
                });

                step++;
                setTimeout(animateStep, 300);
            }

            animateStep();
        }
    })();
    </script>
</body>
</html>
